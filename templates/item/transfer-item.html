<form autocomplete="off" spellcheck="off">
    <div>
        <h3>{{localize "Litm.ui.transfer-item"}} {{ data.item.name }}</h3>
        <hr />
            <div class="actor-selector">
                {{#each playerActors as |actor|}}
                    <div class="actor">
                        <input type="radio" id="{{actor._id}}" name="selected-actor" value="{{actor.name}}">
                        <label for="{{actor._id}}">
                            <img src="{{actor.img}}" />{{actor.name}}
                        </label>
                    </div>
                {{/each}}
            </div>
        <hr />
    </div>
</form>
